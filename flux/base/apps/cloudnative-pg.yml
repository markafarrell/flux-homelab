---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: cloudnative-pg
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: cnpg-system

    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: cnpg
        namespace: cnpg-system
      spec:
        type: "oci"
        interval: 5m0s
        url: oci://ghcr.io/cloudnative-pg/charts/

    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: cnpg
        namespace: cnpg-system
      spec:
        interval: 1h
        releaseName: cnpg
        chart:
          spec:
            chart: cloudnative-pg
          # renovate: datasource=docker depName=ghcr.io/cloudnative-pg/charts/cloudnative-pg
            version: 0.27.1
            sourceRef:
              kind: HelmRepository
              name: cnpg
        values: {}
