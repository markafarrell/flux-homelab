---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: immich
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: immich

    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: immich-database
        namespace: immich
      spec:
        instances: 1

        storage:
          storageClass: rook-ceph-block
          size: 1Gi

        imageName: ghcr.io/tensorchord/cloudnative-vectorchord:16.9-0.4.3

        postgresql:
          shared_preload_libraries:
            - "vchord.so"

        bootstrap:
          initdb:
            # TODO: Use managed extensions (pg 18)
            postInitApplicationSQL:
              # Commands based on: https://immich.app/docs/administration/postgres-standalone/#without-superuser-permission
              - CREATE EXTENSION vchord CASCADE;
              - CREATE EXTENSION earthdistance CASCADE;

    - apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: immich-library-pvc
        namespace: immich
        annotations:
          k8up.io/backup: "true"
      spec:
        storageClassName: rook-cephfs
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: 50Gi

    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: immich
        namespace: immich
      spec:
        type: "oci"
        interval: 5m0s
        url: oci://ghcr.io/immich-app/immich-charts

    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: immich
        namespace: immich
      spec:
        interval: 1h
        releaseName: immich
        chart:
          spec:
            chart: immich
            # renovate: datasource=docker depName=ghcr.io/immich-app/immich-charts/immich
            version: 0.12.0
            sourceRef:
              kind: HelmRepository
              name: immich
        values:
          valkey:
            enabled: true

          immich:
            configuration:
              oauth:
                enabled: true
                issuerUrl: https://dex.homelab.evilcyborgdrone.com/.well-known/openid-configuration
              machineLearning:
                enabled: false

            persistence:
              library:
                existingClaim: immich-library-pvc

          controllers:
            main:
              containers:
                main:
                  image:
                    # renovate: datasource=docker depName=ghcr.io/immich-app/immich-server
                    tag: v3.0.1

          server:
            controllers:
              main:
                replicas: 2
                pod:
                  affinity:
                    podAntiAffinity:
                      requiredDuringSchedulingIgnoredDuringExecution:
                        - labelSelector:
                            matchLabels:
                              app.kubernetes.io/instance: "immich"
                              app.kubernetes.io/controller: "main"
                              app.kubernetes.io/name: "server"
                          topologyKey: "kubernetes.io/hostname"
                containers:
                  main:
                    resources:
                      limits:
                        cpu: 1000m
                        memory: 1Gi
                      requests:
                        cpu: 100m
                        memory: 512Mi
                    env:
                      DB_HOSTNAME:
                        valueFrom:
                          secretKeyRef:
                            name: immich-database-app
                            key: host
                      DB_USERNAME:
                        valueFrom:
                          secretKeyRef:
                            name: immich-database-app
                            key: user
                      DB_PASSWORD:
                        valueFrom:
                          secretKeyRef:
                            name: immich-database-app
                            key: password
                      DB_DATABASE_NAME:
                        valueFrom:
                          secretKeyRef:
                            name: immich-database-app
                            key: dbname

          machine-learning:
            enabled: false

        valuesFrom:
          - kind: Secret
            name: immich-oidc-credentials

    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: immich
        namespace: immich
      spec:
        parentRefs:
          - name: envoy-gateway
            namespace: envoy-gateway
            kind: Gateway
        hostnames:
          - "immich.homelab.evilcyborgdrone.com"
        rules:
          - backendRefs:
              - group: ""
                kind: Service
                name: immich-server
                port: 2283
                weight: 1
            matches:
              - path:
                  type: PathPrefix
                  value: /

    - apiVersion: k8up.io/v1
      kind: Schedule
      metadata:
        name: daily-immich-backup
        namespace: immich
      spec:
        backend:
          s3:
            endpoint: https://5d02038486406f8a28cfedb9414e7c85.r2.cloudflarestorage.com
            bucket: immich-backup
            accessKeyIDSecretRef:
              name: immich-r2-client
              key: access-key-id
            secretAccessKeySecretRef:
              name: immich-r2-client
              key: secret-access-key
          repoPasswordSecretRef:
            name: restic-repo-password
            key: password
        backup:
          schedule: "0 0 * * *" # Daily at midnight
          failedJobsHistoryLimit: 2
          successfulJobsHistoryLimit: 2

