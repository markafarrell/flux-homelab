---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: etcd-monitoring
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  resources:
    - apiVersion: v1
      kind: Service
      metadata:
        name: etcd-k8s
        namespace: kube-system
        labels:
          k8s-app: etcd
      spec:
        clusterIP: None
        ports:
        - name: metrics
          port: 2381
          protocol: TCP
          targetPort: 2381

    - apiVersion: v1
      kind: Endpoints
      metadata:
        name: etcd-k8s
        namespace: kube-system
        labels:
          k8s-app: etcd
      subsets:
      - addresses:
        - ip: 10.0.1.1
        - ip: 10.0.1.2
        - ip: 10.0.1.3
        ports:
        - name: metrics
          port: 2381
          protocol: TCP

    - apiVersion: operator.victoriametrics.com/v1beta1
      kind: VMServiceScrape
      metadata:
        name: etcd-k8s
        namespace: kube-system
        labels:
          team: kube-system
      spec:
        namespaceSelector:
          matchNames:
            - kube-system
        selector:
          matchLabels:
            k8s-app: etcd
        endpoints:
          - port: metrics
            path: /metrics
            interval: 10s
