---
apiVersion: fluxcd.controlplane.io/v1
kind: ResourceSet
metadata:
  name: k8up
  namespace: flux-system
  annotations:
    fluxcd.controlplane.io/reconcileEvery: "30m"
    fluxcd.controlplane.io/reconcileTimeout: "5m"
spec:
  resources:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: k8up-system

    - apiVersion: source.toolkit.fluxcd.io/v1
      kind: HelmRepository
      metadata:
        name: k8up-io
        namespace: k8up-system
      spec:
        interval: 10m0s
        url: https://k8up-io.github.io/k8up

    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: k8up
        namespace: k8up-system
      spec:
        interval: 1h
        releaseName: k8up
        chart:
          spec:
            chart: k8up
            # renovate: datasource=helm depName=k8up registryUrl=https://k8up-io.github.io/k8up
            version: 4.9.0
            sourceRef:
              kind: HelmRepository
              name: k8up-io
        values:
          k8up:
            skipWithoutAnnotation: true
